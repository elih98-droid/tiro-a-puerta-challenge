<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0B0D18"/>

  <!-- Halo dorado -->
  <circle cx="256" cy="256" r="120" fill="#C9A84C" opacity="0.12"/>

  <!-- Motion lines (azul / rojo / verde) -->
  <g>
    <path d="M 60 172 L 168 204" stroke="#2A398D" stroke-width="18" stroke-linecap="round"/>
    <path d="M 100 204 L 180 220" stroke="#2A398D" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <path d="M 76 256 L 208 256" stroke="#E61D25" stroke-width="18" stroke-linecap="round"/>
    <path d="M 120 256 L 192 256" stroke="#E61D25" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <path d="M 60 340 L 168 308" stroke="#3CAC3B" stroke-width="18" stroke-linecap="round"/>
    <path d="M 100 308 L 180 292" stroke="#3CAC3B" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Goal line -->
  <g>
    <line x1="368" y1="60" x2="368" y2="452" stroke="#C9A84C" stroke-width="13" stroke-linecap="round"/>
    <line x1="336" y1="60" x2="400" y2="60" stroke="#C9A84C" stroke-width="16" stroke-linecap="round"/>
    <line x1="336" y1="452" x2="400" y2="452" stroke="#C9A84C" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Ball shadow -->
  <ellipse cx="266" cy="340" rx="64" ry="12" fill="#000" opacity="0.35"/>

  <!-- Ball sphere -->
  <defs>
    <radialGradient id="ball-grad" cx="0.32" cy="0.28" r="0.92">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#EFF2F8"/>
      <stop offset="92%" stop-color="#A8AEBE"/>
      <stop offset="100%" stop-color="#7A8094"/>
    </radialGradient>
    <radialGradient id="ball-gloss" cx="0.32" cy="0.22" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ball-clip">
      <circle cx="256" cy="256" r="75"/>
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="75" fill="url(#ball-grad)" stroke="#0B0D18" stroke-width="7"/>

  <!-- Telstar panels -->
  <g clip-path="url(#ball-clip)">
    <polygon points="256,227 283,247 271,278 241,278 229,247" fill="#0B0D18" stroke="#0B0D18" stroke-width="2" stroke-linejoin="round"/>
    <g stroke="#0B0D18" stroke-width="4.5" stroke-linecap="round" fill="none">
      <line x1="256" y1="227" x2="256" y2="192"/>
      <line x1="283" y1="247" x2="315" y2="235"/>
      <line x1="271" y1="278" x2="291" y2="310"/>
      <line x1="241" y1="278" x2="221" y2="310"/>
      <line x1="229" y1="247" x2="197" y2="235"/>
    </g>
    <polygon points="315,235 327,214 330,246 320,262 303,255" fill="#0B0D18" stroke="#0B0D18" stroke-width="3.5" stroke-linejoin="round"/>
    <polygon points="197,235 185,214 182,246 192,262 209,255" fill="#0B0D18" stroke="#0B0D18" stroke-width="3.5" stroke-linejoin="round"/>
    <polygon points="221,310 207,329 226,333 243,319 237,308" fill="#0B0D18" stroke="#0B0D18" stroke-width="3.5" stroke-linejoin="round"/>
    <polygon points="291,310 305,329 286,333 269,319 275,308" fill="#0B0D18" stroke="#0B0D18" stroke-width="3.5" stroke-linejoin="round"/>
    <g stroke="#0B0D18" stroke-width="3.5" stroke-linecap="round" fill="none">
      <line x1="256" y1="192" x2="256" y2="181"/>
      <line x1="330" y1="246" x2="332" y2="257"/>
      <line x1="182" y1="246" x2="180" y2="257"/>
      <line x1="207" y1="329" x2="202" y2="332"/>
      <line x1="305" y1="329" x2="310" y2="332"/>
    </g>
  </g>

  <!-- Gloss -->
  <ellipse cx="229" cy="224" rx="20" ry="10" fill="#FFFFFF" opacity="0.7" transform="rotate(-32 229 224)"/>
  <circle cx="256" cy="256" r="75" fill="url(#ball-gloss)"/>
  <path d="M 283 320 Q 310 310 320 283" stroke="#FFFFFF" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>
